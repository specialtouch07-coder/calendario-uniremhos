<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendario Instagram — @uniremhosrd</title>
<style>
  :root {
    --gold: #E6A817;
    --gold-dark: #633806;
    --gold-light: #FAEEDA;
    --black: #1A1A1A;
    --teal: #1D9E75;
    --teal-light: #E1F5EE;
    --coral: #D85A30;
    --amber: #BA7517;
    --gray: #F5F5F3;
    --border: #E5E5E3;
    --text: #1A1A1A;
    --text-muted: #6B6B68;
    --white: #FFFFFF;
    --event: #1D9E75;
    --previa: #BA7517;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #F8F8F6; color: var(--text); font-size: 14px; }
  
  /* NAV */
  .nav { background: var(--black); padding: 0 24px; display: flex; align-items: center; justify-content: space-between; height: 52px; position: sticky; top: 0; z-index: 50; }
  .nav-brand { display: flex; align-items: center; gap: 10px; }
  .nav-logo { width: 28px; height: 28px; background: var(--gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: var(--gold-dark); }
  .nav-title { color: #fff; font-size: 14px; font-weight: 500; }
  .nav-sub { color: #888; font-size: 12px; margin-left: 8px; }
  .nav-right { display: flex; gap: 8px; align-items: center; }
  .nav-btn { background: rgba(255,255,255,0.1); border: none; color: #ccc; padding: 5px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; transition: background .15s; }
  .nav-btn:hover { background: rgba(255,255,255,0.2); }
  .nav-btn.active { background: var(--gold); color: var(--gold-dark); font-weight: 500; }

  /* LAYOUT */
  .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

  /* STATS */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat { background: var(--white); border: 0.5px solid var(--border); border-radius: 10px; padding: 14px 16px; }
  .stat-num { font-size: 26px; font-weight: 600; color: var(--text); }
  .stat-lbl { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .stat.green .stat-num { color: var(--teal); }
  .stat.gold .stat-num { color: var(--amber); }

  /* TOOLBAR */
  .toolbar { background: var(--white); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 16px; margin-bottom: 16px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .month-tabs { display: flex; gap: 4px; }
  .month-tab { padding: 5px 14px; border-radius: 8px; border: 0.5px solid var(--border); font-size: 12px; cursor: pointer; background: transparent; color: var(--text-muted); transition: all .15s; }
  .month-tab.active { background: var(--black); color: #fff; border-color: var(--black); }
  .divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
  .filter-pills { display: flex; gap: 4px; flex-wrap: wrap; }
  .fpill { padding: 4px 10px; border-radius: 20px; border: 0.5px solid var(--border); font-size: 11px; cursor: pointer; background: transparent; color: var(--text-muted); transition: all .15s; }
  .fpill:hover { border-color: #aaa; }
  .fpill.active { background: var(--black); color: #fff; border-color: var(--black); }
  .fpill.f-feed.active { background: var(--black); }
  .fpill.f-story.active { background: var(--gold); color: var(--gold-dark); border-color: var(--gold); }
  .fpill.f-event.active { background: var(--teal); color: #fff; border-color: var(--teal); }
  .fpill.f-previa.active { background: var(--amber); color: #fff; border-color: var(--amber); }
  .fpill.f-pending.active { background: var(--coral); color: #fff; border-color: var(--coral); }
  .search-wrap { margin-left: auto; }
  .search-input { border: 0.5px solid var(--border); border-radius: 8px; padding: 5px 10px; font-size: 12px; width: 180px; outline: none; background: var(--gray); color: var(--text); }
  .search-input:focus { border-color: var(--gold); background: var(--white); }

  /* CALENDAR GRID */
  .cal-wrap { background: var(--white); border: 0.5px solid var(--border); border-radius: 10px; overflow: hidden; }
  .cal-dow { display: grid; grid-template-columns: repeat(7, 1fr); background: var(--gray); border-bottom: 0.5px solid var(--border); }
  .cal-dow span { text-align: center; font-size: 11px; color: var(--text-muted); font-weight: 500; padding: 8px 0; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 0; }
  .day { min-height: 88px; border-right: 0.5px solid var(--border); border-bottom: 0.5px solid var(--border); padding: 5px; vertical-align: top; }
  .day:nth-child(7n) { border-right: none; }
  .day.empty { background: var(--gray); opacity: .5; }
  .day.out-range { opacity: .25; }
  .day.today-marker { background: #FFFBF0; }
  .day-num { font-size: 11px; color: var(--text-muted); margin-bottom: 3px; font-weight: 500; }
  .day.today-marker .day-num { color: var(--gold-dark); font-weight: 700; }
  .post-pill { font-size: 9px; padding: 2px 5px; border-radius: 5px; margin-top: 2px; display: block; cursor: pointer; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: opacity .1s; line-height: 1.4; }
  .post-pill:hover { opacity: .75; }
  .pp-feed   { background: var(--black); color: #fff; }
  .pp-story  { background: var(--gold); color: var(--gold-dark); }
  .pp-event  { background: var(--teal); color: #fff; }
  .pp-previa { background: var(--amber); color: #fff; }
  .pp-done   { opacity: .45; text-decoration: line-through; }

  /* LIST VIEW */
  .list-view { display: flex; flex-direction: column; gap: 6px; }
  .list-item { background: var(--white); border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 14px; display: flex; gap: 12px; align-items: flex-start; cursor: pointer; transition: border-color .15s; }
  .list-item:hover { border-color: #aaa; }
  .list-item.done-item { opacity: .5; }
  .li-date { font-size: 11px; color: var(--text-muted); min-width: 75px; flex-shrink: 0; padding-top: 2px; }
  .li-body { flex: 1; min-width: 0; }
  .li-title { font-size: 13px; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .li-preview { font-size: 11px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 3px; }
  .li-arte { font-size: 10px; color: #aaa; margin-top: 3px; }
  .li-right { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; flex-shrink: 0; }
  .badge { font-size: 9px; padding: 2px 7px; border-radius: 8px; white-space: nowrap; font-weight: 500; }
  .b-feed   { background: #E8E8E8; color: var(--black); }
  .b-story  { background: var(--gold-light); color: var(--gold-dark); }
  .b-event  { background: var(--teal-light); color: #085041; }
  .b-previa { background: #FAEEDA; color: var(--gold-dark); }
  .check-btn { width: 24px; height: 24px; border-radius: 50%; border: 1px solid var(--border); background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px; transition: all .15s; }
  .check-btn:hover { border-color: var(--teal); }
  .check-btn.done { background: var(--teal); border-color: var(--teal); color: #fff; }

  /* MODAL */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200; align-items: center; justify-content: center; padding: 16px; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 14px; width: 100%; max-width: 540px; max-height: 85vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,.2); }
  .modal-head { padding: 18px 20px 14px; border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; position: sticky; top: 0; background: var(--white); border-radius: 14px 14px 0 0; }
  .modal-title { font-size: 15px; font-weight: 600; color: var(--text); }
  .modal-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; display: flex; gap: 8px; align-items: center; }
  .close-btn { background: var(--gray); border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 16px; color: var(--text-muted); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .close-btn:hover { background: var(--border); }
  .modal-body { padding: 16px 20px; }
  .field-lbl { font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .06em; margin: 14px 0 6px; }
  .field-lbl:first-child { margin-top: 0; }
  .copy-box { background: var(--gray); border-radius: 8px; padding: 12px; font-size: 12px; color: var(--text); line-height: 1.6; white-space: pre-wrap; word-break: break-word; position: relative; }
  .copy-btn { position: absolute; top: 8px; right: 8px; background: var(--white); border: 0.5px solid var(--border); border-radius: 6px; padding: 3px 9px; font-size: 11px; cursor: pointer; color: var(--text-muted); transition: all .15s; }
  .copy-btn:hover { border-color: var(--gold); color: var(--gold-dark); }
  .copy-btn.copied { background: var(--teal-light); color: #085041; border-color: var(--teal); }
  .modal-foot { padding: 14px 20px; border-top: 0.5px solid var(--border); display: flex; gap: 8px; position: sticky; bottom: 0; background: var(--white); border-radius: 0 0 14px 14px; }
  .mark-btn { flex: 1; padding: 9px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--white); font-size: 13px; cursor: pointer; color: var(--text); font-weight: 500; transition: all .15s; }
  .mark-btn:hover { border-color: var(--teal); color: var(--teal); }
  .mark-btn.is-done { background: var(--teal); color: #fff; border-color: var(--teal); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 48px 16px; color: var(--text-muted); }
  .empty-icon { font-size: 32px; margin-bottom: 12px; }

  /* PROGRESS BAR */
  .progress-wrap { background: var(--white); border: 0.5px solid var(--border); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; }
  .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .progress-label { font-size: 12px; color: var(--text-muted); }
  .progress-pct { font-size: 13px; font-weight: 600; color: var(--teal); }
  .progress-bar { height: 6px; background: var(--gray); border-radius: 10px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--teal); border-radius: 10px; transition: width .4s ease; }

  /* LEGEND */
  .legend { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; }
  .leg { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-muted); }
  .leg-dot { width: 10px; height: 10px; border-radius: 3px; }


  /* CATEGORIAS */
  .cat-badge { font-size: 9px; padding: 2px 7px; border-radius: 8px; white-space: nowrap; font-weight: 600; margin-left: 4px; }
  .cat-Promocion          { background: #E3F2FD; color: #1565C0; }
  .cat-Talleres           { background: #E8F5E9; color: #2E7D32; }
  .cat-Plan-de-Escuelas   { background: #F3E5F5; color: #6A1B9A; }
  .cat-Institucional      { background: #FFF3E0; color: #E65100; }
  .cat-Admisiones         { background: #FFF8E1; color: #F57F17; }
  .cat-Evento             { background: #FCE4EC; color: #880E4F; }
  .cat-Testimonios        { background: #E0F7FA; color: #006064; }

  /* FILTER PILLS CATEGORIA */
  .fpill.f-cat-Promocion.active        { background: #1565C0; color: #fff; border-color: #1565C0; }
  .fpill.f-cat-Talleres.active         { background: #2E7D32; color: #fff; border-color: #2E7D32; }
  .fpill.f-cat-Plan.active             { background: #6A1B9A; color: #fff; border-color: #6A1B9A; }
  .fpill.f-cat-Institucional.active    { background: #E65100; color: #fff; border-color: #E65100; }
  .fpill.f-cat-Admisiones.active       { background: #F57F17; color: #fff; border-color: #F57F17; }
  .fpill.f-cat-Evento.active           { background: #880E4F; color: #fff; border-color: #880E4F; }
  .fpill.f-cat-Testimonios.active      { background: #006064; color: #fff; border-color: #006064; }
  @media (max-width: 600px) {
    .stats { grid-template-columns: repeat(2,1fr); }
    .nav-sub { display: none; }
    .search-wrap { width: 100%; }
    .search-input { width: 100%; }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    <div class="nav-logo">U</div>
    <span class="nav-title">@uniremhosrd</span>
    <span class="nav-sub">Calendario Instagram 2026</span>
  </div>
  <div class="nav-right">
    <button class="nav-btn active" id="btn-grid" onclick="setView('grid')">&#9776; Grid</button>
    <button class="nav-btn" id="btn-list" onclick="setView('list')">&#9783; Lista</button>
  </div>
</nav>

<div class="container">

  <!-- STATS -->
  <div class="stats" id="stats-bar"></div>

  <!-- PROGRESS -->
  <div class="progress-wrap">
    <div class="progress-header">
      <span class="progress-label" id="prog-label">Progreso de la campaña</span>
      <span class="progress-pct" id="prog-pct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="month-tabs">
      <button class="month-tab active" onclick="setMonth('jun',this)">Junio</button>
      <button class="month-tab" onclick="setMonth('jul',this)">Julio</button>
      <button class="month-tab" onclick="setMonth('ago',this)">Agosto</button>
    </div>
    <div class="divider"></div>
    <div class="filter-pills">
      <button class="fpill active" onclick="setFilter('all',this)">Todos</button>
      <button class="fpill f-feed" onclick="setFilter('feed',this)">Feed</button>
      <button class="fpill f-story" onclick="setFilter('story',this)">Historia</button>
      <button class="fpill f-event" onclick="setFilter('event',this)">Eventos</button>
      <button class="fpill f-previa" onclick="setFilter('previa',this)">Previa</button>
      <button class="fpill f-pending" onclick="setFilter('pending',this)">Pendientes</button>
      <button class="fpill f-cat-Promocion" onclick="setFilter('cat:Promocion',this)">Promoción</button>
      <button class="fpill f-cat-Talleres" onclick="setFilter('cat:Talleres / Diplomados',this)">Talleres</button>
      <button class="fpill f-cat-Plan" onclick="setFilter('cat:Plan de Escuelas',this)">Plan Escuelas</button>
      <button class="fpill f-cat-Institucional" onclick="setFilter('cat:Institucional',this)">Institucional</button>
      <button class="fpill f-cat-Admisiones" onclick="setFilter('cat:Admisiones / Inscripciones',this)">Admisiones</button>
      <button class="fpill f-cat-Evento" onclick="setFilter('cat:Evento',this)">Evento</button>
      <button class="fpill f-cat-Testimonios" onclick="setFilter('cat:Testimonios / Historias',this)">Testimonios</button>
    </div>
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="Buscar publicación..." oninput="setSearch(this.value)" id="search-input">
    </div>
  </div>

  <!-- LEGEND -->
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:var(--black)"></div>Feed</div>
    <div class="leg"><div class="leg-dot" style="background:var(--gold)"></div>Historia</div>
    <div class="leg"><div class="leg-dot" style="background:var(--teal)"></div>Evento especial</div>
    <div class="leg"><div class="leg-dot" style="background:var(--amber)"></div>Previa</div>
  </div>

  <!-- GRID VIEW -->
  <div id="grid-view">
    <div class="cal-wrap">
      <div class="cal-dow">
        <span>Lun</span><span>Mar</span><span>Mié</span><span>Jue</span><span>Vie</span><span>Sáb</span><span>Dom</span>
      </div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
  </div>

  <!-- LIST VIEW -->
  <div id="list-view" style="display:none">
    <div class="list-view" id="list-container"></div>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal-box">
    <div class="modal-head">
      <div>
        <div class="modal-title" id="m-title"></div>
        <div class="modal-meta" id="m-meta"></div>
      </div>
      <button class="close-btn" onclick="closeModal()">&#10005;</button>
    </div>
    <div class="modal-body" id="m-body"></div>
    <div class="modal-foot">
      <button class="mark-btn" id="mark-btn" onclick="toggleDone()">
        <span id="mark-label">Marcar como publicada</span>
      </button>
    </div>
  </div>
</div>

<script src="posts.js"></script>
<script>
// POSTS cargados desde posts.js

const MN = {jun:'Junio',jul:'Julio',ago:'Agosto'};
const MO = {jun:5,jul:6,ago:7};
let month='jun', view='grid', filter='all', search='', activeId=null;
const done={};

function getFiltered(){
  return POSTS.filter(p=>{
    if(p.month!==month) return false;
    if(filter==='pending') return !done[p.id];
    if(filter.startsWith('cat:')) {
      const cat = filter.replace('cat:','');
      if(p.categoria !== cat) return false;
    } else if(filter!=='all'&&filter!=='pending'&&p.tipo!==filter) return false;
    if(search){
      const q=search.toLowerCase();
      return p.title.toLowerCase().includes(q)||p.copy.toLowerCase().includes(q)||p.caption.toLowerCase().includes(q);
    }
    return true;
  });
}

function renderStats(){
  const total=POSTS.length;
  const doneCnt=POSTS.filter(p=>done[p.id]).length;
  const pct=Math.round(doneCnt/total*100);
  const events=POSTS.filter(p=>p.tipo==='event').length;
  const pending=POSTS.filter(p=>!done[p.id]).length;
  document.getElementById('stats-bar').innerHTML=`
    <div class="stat"><div class="stat-num">${total}</div><div class="stat-lbl">Total publicaciones</div></div>
    <div class="stat green"><div class="stat-num">${doneCnt}</div><div class="stat-lbl">Publicadas</div></div>
    <div class="stat gold"><div class="stat-num">${events}</div><div class="stat-lbl">Eventos especiales</div></div>
    <div class="stat"><div class="stat-num">${pending}</div><div class="stat-lbl">Pendientes</div></div>
  `;
  document.getElementById('prog-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=`Progreso de la campaña — ${doneCnt} de ${total} publicadas`;
}

function renderGrid(){
  const c=document.getElementById('cal-grid');
  const year=2026, mo=MO[month];
  const fd=new Date(year,mo,1).getDay();
  const off=fd===0?6:fd-1;
  const days=new Date(year,mo+1,0).getDate();
  const filtered=new Set(getFiltered().map(p=>p.id));
  let h='';
  for(let i=0;i<off;i++) h+=`<div class="day empty"></div>`;
  for(let d=1;d<=days;d++){
    const ds=`2026-${String(mo+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const inR=ds>='2026-06-03'&&ds<='2026-08-29';
    const posts=POSTS.filter(p=>p.date===ds&&p.month===month);
    const vis=posts.filter(p=>filtered.has(p.id));
    const cls='day'+(inR?'':' out-range')+(ds==='2026-06-05'?' today-marker':'');
    let pills=vis.map(p=>{
      const isDone=done[p.id];
      const short=p.title.replace(/^[🚀🔴💉🌍🩸🔬💼🩺👶🌟📋⏰📅]+\s*/,'').substring(0,24);
      return `<span class="post-pill pp-${p.tipo}${isDone?' pp-done':''}" onclick="openPost(${p.id})" title="${p.title}">${isDone?'✓ ':''}${short}</span>`;
    }).join('');
    h+=`<div class="${cls}"><div class="day-num">${d}</div>${pills}</div>`;
  }
  c.innerHTML=h;
}

function renderList(){
  const c=document.getElementById('list-container');
  const posts=getFiltered().sort((a,b)=>a.date.localeCompare(b.date));
  if(!posts.length){c.innerHTML=`<div class="empty"><div class="empty-icon">📭</div>No hay publicaciones con este filtro.</div>`;return;}
  c.innerHTML=posts.map(p=>{
    const isDone=done[p.id];
    const d=new Date(p.date+'T12:00:00');
    const preview=(p.copy!=='—'?p.copy:p.caption).replace(/\n/g,' ').substring(0,70)+'…';
    const typeLabel={feed:'Feed',story:'Historia',event:'Evento',previa:'Previa'}[p.tipo];
    const catClass=(p.categoria||'').replace(/[^a-zA-Z]/g,'-').replace(/-+/g,'-');
    const catBadge=p.categoria&&p.categoria!=='—'?`<span class="cat-badge cat-${catClass}">${p.categoria}</span>`:'';
    return `<div class="list-item${isDone?' done-item':''}" onclick="openPost(${p.id})">
      <div class="li-date">${d.getDate()} ${MN[month]}</div>
      <div class="li-body">
        <div class="li-title">${p.title}</div>
        <div class="li-preview">${preview}</div>
        <div class="li-arte">🎨 ${p.arte}</div>
      </div>
      <div class="li-right">
        <span class="badge b-${p.tipo}">${typeLabel}</span>
        <button class="check-btn${isDone?' done':''}" onclick="event.stopPropagation();toggleDoneId(${p.id})" title="${isDone?'Marcar pendiente':'Marcar publicada'}">${isDone?'✓':''}</button>
      </div>
    </div>`;
  }).join('');
}

function render(){renderStats();view==='grid'?renderGrid():renderList();}

function setView(v){
  view=v;
  document.getElementById('grid-view').style.display=v==='grid'?'block':'none';
  document.getElementById('list-view').style.display=v==='list'?'block':'none';
  document.getElementById('btn-grid').classList.toggle('active',v==='grid');
  document.getElementById('btn-list').classList.toggle('active',v==='list');
  render();
}
function setMonth(m,el){
  month=m;
  document.querySelectorAll('.month-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  render();
}
function setFilter(f,btn){
  filter=f;
  document.querySelectorAll('.fpill').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}
function setSearch(v){search=v;render();}

function openPost(id){
  const p=POSTS.find(x=>x.id===id);
  if(!p) return;
  activeId=id;
  const d=new Date(p.date+'T12:00:00');
  const typeLabel={feed:'Feed',story:'Historia',event:'Evento especial',previa:'Previa'}[p.tipo];
  document.getElementById('m-title').textContent=p.title;
  document.getElementById('m-meta').innerHTML=`<span class="badge b-${p.tipo}">${typeLabel}</span> ${d.getDate()} de ${MN[p.month]} · ${p.arte}`;
  let body='';
  const copyData={};
  if(p.copy!=='—'){
    copyData['copy']=p.copy;
    body+=`<div class="field-lbl">Copy / Historia</div><div class="copy-box">${esc(p.copy)}<button class="copy-btn" id="cb-copy" onclick="copyField('copy')">Copiar</button></div>`;
  }
  if(p.caption!=='—'){
    copyData['caption']=p.caption;
    body+=`<div class="field-lbl">Caption (pie de foto)</div><div class="copy-box">${esc(p.caption)}<button class="copy-btn" id="cb-caption" onclick="copyField('caption')">Copiar</button></div>`;
  }
  if(p.hashtags!=='—'){
    copyData['hashtags']=p.hashtags;
    body+=`<div class="field-lbl">Hashtags</div><div class="copy-box">${esc(p.hashtags)}<button class="copy-btn" id="cb-hashtags" onclick="copyField('hashtags')">Copiar</button></div>`;
  }
  document.getElementById('m-body').innerHTML=body;
  window._cd=copyData;
  const isDone=!!done[id];
  const mb=document.getElementById('mark-btn');
  mb.className='mark-btn'+(isDone?' is-done':'');
  document.getElementById('mark-label').textContent=isDone?'✓ Publicada — marcar pendiente':'Marcar como publicada';
  document.getElementById('modal-overlay').classList.add('open');
}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function copyField(key){
  const text=window._cd[key];
  if(!text) return;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('cb-'+key);
    if(btn){btn.textContent='✓ Copiado';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copiar';btn.classList.remove('copied');},2000);}
  }).catch(()=>{});
}
function toggleDone(){
  if(!activeId) return;
  done[activeId]=!done[activeId];
  const isDone=done[activeId];
  const mb=document.getElementById('mark-btn');
  mb.className='mark-btn'+(isDone?' is-done':'');
  document.getElementById('mark-label').textContent=isDone?'✓ Publicada — marcar pendiente':'Marcar como publicada';
  render();
}
function toggleDoneId(id){done[id]=!done[id];render();}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');activeId=null;}
function handleOverlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

render();
</script>
</body>
</html>
